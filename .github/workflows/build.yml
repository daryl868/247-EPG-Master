name: Build EPG Vision Studio

on:
  workflow_dispatch:
  push:
    paths:
      - "config/**"
      - "providers/**"
      - "xmltv/**"
      - "scripts/**"
      - ".github/workflows/build.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr
          pip install -r requirements.txt
      - name: Build XMLTV and M3U
        run: python scripts/build_epg.py
      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated EPG Vision Studio files"
          file_pattern: "generated/*.xml generated/*.m3u"
