name: Build EPG Vision Studio

on:
  workflow_dispatch:
  push:
    paths:
      - "config/**"
      - "providers/**"
      - "xmltv/**"
      - "scripts/**"
      - "metadata/**"
      - "ocr/**"
      - "processing/**"
      - "requirements.txt"
      - ".github/workflows/build.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr
          pip install -r requirements.txt

      - name: Create TMDB config
        run: |
          mkdir -p config
          echo "{\"api_key\":\"${{ secrets.TMDB_API_KEY }}\"}" > config/tmdb.json

      - name: Build XMLTV and M3U
        run: python scripts/build_epg.py

            - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add generated/*.xml generated/*.m3u

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Update generated EPG Vision Studio files"

          git pull --rebase origin main
          git push origin main
